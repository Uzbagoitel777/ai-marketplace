{% extends 'base.html' %}

{% block title %}Создать магазин{% endblock %}

{% block content %}
    <h1>Создать новый магазин</h1>
    
    <form method="post" style="max-width: 500px; margin-top: 20px;">
        {% csrf_token %}
        
        <div style="margin-bottom: 15px;">
            <label for="name" style="display: block; margin-bottom: 5px;">Название магазина:</label>
            <input type="text" name="name" id="name" required style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px;">
        </div>
        
        <div style="margin-bottom: 15px;">
            <label for="description" style="display: block; margin-bottom: 5px;">Описание (необязательно):</label>
            <textarea name="description" id="description" rows="5" style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px;"></textarea>
        </div>
        
        <button type="submit" style="background: #4CAF50; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer;">Создать</button>
        <a href="{% url 'my_shops' %}" style="margin-left: 10px;">Отмена</a>
    </form>
{% endblock %}
