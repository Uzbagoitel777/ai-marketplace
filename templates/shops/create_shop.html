{% extends 'base.html' %}

{% block title %}Создать магазин{% endblock %}

{% block content %}
<div style="max-width: 620px; margin: 0 auto;">
    <div class="card"><div class="card-body">
        <h1>Создать магазин вручную</h1>
        <form method="post">
            {% csrf_token %}
            <div class="form-group"><label class="form-label">Название магазина</label><input type="text" name="name" required class="form-control"></div>
            <div class="form-group"><label class="form-label">Описание</label><textarea name="description" rows="3" class="form-control"></textarea></div>
            <div class="form-group"><label class="form-label">Город магазина *</label><input type="text" name="city" required placeholder="Например: Екатеринбург" class="form-control"></div>
            <div class="form-group"><label class="form-label">Адрес магазина *</label><input type="text" name="address" required placeholder="Улица, дом, офис / пункт самовывоза" class="form-control"></div>
            <div class="form-group"><label class="form-label">Базовый шаблон</label><select name="template_key" class="form-control"><option value="modern">Modern</option><option value="minimal">Minimal</option><option value="premium">Premium</option></select></div>
            <button class="btn btn-primary" type="submit" style="width: 100%;">Создать</button>
        </form>
    </div></div>
</div>
{% endblock %}
