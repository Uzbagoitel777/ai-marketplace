{% extends 'shops/shop_base.html' %}

{% block title %}Вход покупателя | {{ shop.name }}{% endblock %}

{% block content %}
<div style="max-width: 460px; margin: 0 auto;">
    <div class="card"><div class="card-body">
        <h1>Вход покупателя</h1>
        <p style="color: var(--gray-600);">Этот вход относится только к витрине магазина «{{ shop.name }}».</p>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button class="btn btn-primary" type="submit" style="width: 100%;">Войти</button>
        </form>
        <p style="margin-top: 16px;"><a href="{% url 'shop_customer_register' shop.slug %}">Создать аккаунт покупателя</a></p>
    </div></div>
</div>
<script>document.querySelectorAll('input').forEach((i)=>i.classList.add('form-control'));</script>
{% endblock %}
