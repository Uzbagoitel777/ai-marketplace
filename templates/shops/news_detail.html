{% extends 'base.html' %}

{% block title %}{{ news.title }} | {{ shop.name }}{% endblock %}

{% block content %}
    <p><a href="{% url 'shop_news' shop.slug %}">← Все новости</a></p>
    
    <div style="background: white; border: 1px solid #ddd; border-radius: 5px; padding: 30px;">
        <h1>{{ news.title }}</h1>
        <p style="color: #999;">{{ news.created_at|date:"d.m.Y H:i" }}</p>
        <hr>
        <p style="line-height: 1.6; font-size: 16px;">{{ news.content }}</p>
    </div>
    
    <p style="margin-top: 20px;"><a href="{% url 'shop_front' shop.slug %}">← На главную магазина</a></p>
{% endblock %}
