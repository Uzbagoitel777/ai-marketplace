{% extends 'base.html' %}

{% block title %}Создать магазин с ИИ{% endblock %}

{% block content %}
<div class="breadcrumbs">
    <a href="/">Главная</a>
    <span class="breadcrumbs-separator">›</span>
    <a href="{% url 'my_shops' %}">Мои магазины</a>
    <span class="breadcrumbs-separator">›</span>
    <span>Создать с ИИ</span>
</div>

<div style="max-width: 600px; margin: 0 auto;">
    <div class="card">
        <div class="card-body">
            <h1>Создать магазин с помощью ИИ</h1>
            <p style="color: var(--gray-600); margin-bottom: 24px;">Расскажите, какой магазин вы хотите создать, и искусственный интеллект поможет вам!</p>
            
            <form method="post">
                {% csrf_token %}
                
                <div class="form-group">
                    <label class="form-label">Название магазина</label>
                    <input type="text" name="shop_name" required class="form-control" placeholder="Например: TechStore, FashionShop">
                </div>
                
                <div class="form-group">
                    <label class="form-label">Что вы продаете? (необязательно)</label>
                    <textarea name="shop_description" rows="3" class="form-control" placeholder="Например: электроника, смартфоны, ноутбуки..."></textarea>
                </div>
                
                <button type="submit" class="btn btn-primary" style="width: 100%; padding: 14px;">
                    Сгенерировать магазин с ИИ
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
