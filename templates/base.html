<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AI Shop Platform{% endblock %}</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
        }
        nav {
            background: #333;
            color: white;
            padding: 15px 20px;
            overflow: hidden;
        }
        nav a {
            color: white;
            text-decoration: none;
            margin-right: 20px;
        }
        nav a:hover {
            text-decoration: underline;
        }
        nav .right {
            float: right;
        }
        .container {
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 20px;
            min-height: 500px;
        }
        .alert {
            padding: 10px;
            background: #4CAF50;
            color: white;
            border-radius: 5px;
            margin-bottom: 20px;
        }
        .alert-error {
            background: #f44336;
        }
        .alert-success {
            background: #4CAF50;
        }
        .alert-warning {
            background: #ff9800;
        }
        .alert-info {
            background: #2196F3;
        }
        button, .button {
            display: inline-block;
            background: #4CAF50;
            color: white;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 5px;
            border: none;
            cursor: pointer;
        }
        button:hover, .button:hover {
            background: #45a049;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: left;
        }
        th {
            background: #f2f2f2;
        }
        input[type="text"],
        input[type="password"],
        input[type="email"],
        input[type="number"],
        textarea,
        select {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
        }
        form div {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        hr {
            margin: 20px 0;
            border: none;
            border-top: 1px solid #ddd;
        }
        footer {
            background: #333;
            color: white;
            text-align: center;
            padding: 20px;
            margin-top: 50px;
        }
        .shop-card {
            background: white;
            border: 1px solid #ddd;
            border-radius: 5px;
            padding: 15px;
            margin-bottom: 15px;
        }
        .shop-card h3 {
            margin-bottom: 10px;
        }
        .shop-card p {
            color: #666;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <nav>
        <a href="/">Главная</a>
        <a href="{% url 'my_shops' %}">Мои магазины</a>
        <a href="/admin/">Админка</a>
        {% if user.is_authenticated %}
            <span class="right">Привет, {{ user.username }} | <a href="/admin/logout/">Выйти</a></span>
        {% else %}
            <span class="right"><a href="/admin/login/">Войти</a></span>
        {% endif %}
    </nav>
    
    <div class="container">
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }}">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}
        
        {% block content %}
        {% endblock %}
    </div>
    
    <footer>
        <p>AI Shop Platform — создай магазин с помощью ИИ</p>
    </footer>
</body>
</html>
